<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Training log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #14171A;
    --surface: #1C2024;
    --surface-alt: #22272C;
    --border: #2C3238;
    --red: #FF4B3E;
    --red-dim: #7A2B25;
    --green: #3DDC97;
    --green-dim: #1F5A44;
    --amber: #FFB84D;
    --amber-dim: #7A5A24;
    --blue: #4FA3FF;
    --blue-dim: #254A73;
    --text: #F2F0EA;
    --muted: #8B9199;
    --faint: #5A5F66;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    padding: 32px 40px 60px;
  }
  @media (max-width: 700px) {
    body { padding: 20px 16px 40px; }
  }
  h1, h2 { margin: 0; }
  input, select {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
  }
  input:focus, select:focus { border-color: var(--red); }
  button.lane-btn {
    background: var(--red);
    color: #1A0E0C;
    border: none;
    border-radius: 4px;
    padding: 8px 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    cursor: pointer;
  }
  button.lane-btn:hover { background: #ff6055; }
  button.ghost-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    padding: 8px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
  }
  button.ghost-btn:hover { border-color: var(--faint); color: var(--text); }
  button.icon-btn {
    background: transparent;
    border: none;
    color: var(--faint);
    cursor: pointer;
    padding: 4px;
    font-size: 15px;
  }
  button.icon-btn:hover { color: var(--red); }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--red);
    padding-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--red);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .title {
    font-family: 'Oswald', sans-serif;
    font-size: 38px;
    font-weight: 700;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }
  .streak-label {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: right;
  }
  .streak-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px;
    font-weight: 700;
    color: var(--green);
    text-align: right;
  }
  .streak-value span { font-size: 14px; color: var(--muted); font-weight: 500; }

  .section-label {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 36px 0 16px;
  }
  .section-label .idx {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--red);
    font-weight: 700;
  }
  .section-label h2 {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .section-label .rule { flex: 1; height: 1px; background: var(--border); }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 0;
  }
  .stat-top { display: flex; align-items: center; justify-content: space-between; }
  .stat-label {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .stat-value-row { display: flex; align-items: baseline; gap: 6px; }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-unit { font-size: 12px; color: var(--muted); }
  .lane-meter { display: flex; gap: 3px; width: 100%; }
  .lane-seg { flex: 1; height: 8px; border-radius: 1px; }
  .stat-pct { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--faint); }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 700px) {
    .two-col { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 18px 12px;
  }
  .panel-top { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
  .panel-title {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .panel-metric { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .chart-wrap { position: relative; height: 180px; }

  .log-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 4px; }
  .workout-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-top: 1px solid var(--border);
  }
  .workout-row:first-child { border-top: none; }
  .workout-name { font-size: 14px; font-weight: 500; }
  .workout-meta { font-size: 12px; color: var(--muted); }
  .workout-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--muted); min-width: 60px; text-align: right; }
  .workout-cal { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--amber); min-width: 70px; text-align: right; }
  .empty-state { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; }

  .form-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; padding: 14px; border-top: 1px solid var(--border); }
  .footer-strip {
    margin-top: 32px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--faint);
    border-top: 1px solid var(--border);
    padding-top: 14px;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="eyebrow" id="dateLabel">SAT JUL 18 · WEEK 29</div>
    <div class="title">Training log</div>
  </div>
  <div>
    <div class="streak-label">Current streak</div>
    <div class="streak-value">6 <span>days</span></div>
  </div>
</header>

<div class="section-label"><span class="idx">01</span><h2>Today</h2><div class="rule"></div></div>
<div class="stat-grid" id="statGrid"></div>

<div class="section-label"><span class="idx">02</span><h2>This week</h2><div class="rule"></div></div>
<div class="two-col">
  <div class="panel">
    <div class="panel-top">
      <span class="panel-title">Daily steps</span>
      <span class="panel-metric" style="color: var(--red);" id="weeklyStepsTotal"></span>
    </div>
    <div class="chart-wrap"><canvas id="stepsChart" role="img" aria-label="Bar chart of daily steps for the week"></canvas></div>
  </div>
  <div class="panel">
    <div class="panel-top">
      <span class="panel-title">Weight trend</span>
      <span class="panel-metric" id="weightTrend"></span>
    </div>
    <div class="chart-wrap"><canvas id="weightChart" role="img" aria-label="Line chart of weight over time"></canvas></div>
    <div class="form-row" style="border-top: none; padding: 8px 0 4px;" id="weightFormRow">
      <button class="ghost-btn" id="showWeightFormBtn">+ Log weight</button>
    </div>
  </div>
</div>

<div class="section-label"><span class="idx">03</span><h2>Workout log</h2><div class="rule"></div></div>
<div class="log-panel">
  <div id="workoutList"></div>
  <div class="form-row" id="workoutFormRow">
    <button class="ghost-btn" id="showWorkoutFormBtn">+ Log workout</button>
  </div>
</div>

<div class="footer-strip">
  <span id="footerWorkouts"></span>
  <span>·</span>
  <span id="footerSessions"></span>
  <span>·</span>
  <span>Goal weight: 175 lb</span>
</div>

<script>
const COLORS = {
  red: '#FF4B3E', redDim: '#7A2B25',
  green: '#3DDC97', greenDim: '#1F5A44',
  amber: '#FFB84D', amberDim: '#7A5A24',
  blue: '#4FA3FF', blueDim: '#254A73',
  text: '#F2F0EA', muted: '#8B9199', faint: '#5A5F66',
  border: '#2C3238', surfaceAlt: '#22272C'
};

let today = { steps: 9840, stepGoal: 10000, calories: 1740, calorieGoal: 2200, active: 47, activeGoal: 60, water: 5, waterGoal: 8 };

let weekly = [
  { day: 'Mon', steps: 8200 },
  { day: 'Tue', steps: 10400 },
  { day: 'Wed', steps: 6100 },
  { day: 'Thu', steps: 11900 },
  { day: 'Fri', steps: 7300 },
  { day: 'Sat', steps: 13200 },
  { day: 'Sun', steps: 4800 },
];

let weightLog = [
  { date: 'Jun 22', weight: 182.4 },
  { date: 'Jun 29', weight: 181.6 },
  { date: 'Jul 6', weight: 180.9 },
  { date: 'Jul 13', weight: 180.2 },
  { date: 'Jul 18', weight: 179.5 },
];

let workouts = [
  { id: 1, name: 'Morning run', type: 'Cardio', duration: 32, calories: 340, date: 'Today' },
  { id: 2, name: 'Upper body strength', type: 'Strength', duration: 45, calories: 280, date: 'Yesterday' },
  { id: 3, name: 'Yoga flow', type: 'Mobility', duration: 25, calories: 110, date: 'Jul 16' },
];

const TYPE_OPTIONS = ['Cardio', 'Strength', 'Mobility', 'Sport', 'Other'];

function laneMeter(value, goal, color, dimColor, segments = 12) {
  const filled = Math.min(segments, Math.round((value / goal) * segments));
  let html = '<div class="lane-meter">';
  for (let i = 0; i < segments; i++) {
    html += `<div class="lane-seg" style="background:${i < filled ? color : dimColor}"></div>`;
  }
  html += '</div>';
  return html;
}

function statCard({ icon, label, value, unit, goal, color, dimColor }) {
  const pct = Math.min(100, Math.round((value / goal) * 100));
  return `
    <div class="stat-card">
      <div class="stat-top">
        <span class="stat-label">${label}</span>
        <span style="color:${color}; font-size:16px;">${icon}</span>
      </div>
      <div class="stat-value-row">
        <span class="stat-value">${value.toLocaleString()}</span>
        <span class="stat-unit">${unit} / ${goal.toLocaleString()}</span>
      </div>
      ${laneMeter(value, goal, color, dimColor)}
      <span class="stat-pct" style="${pct >= 100 ? `color:${COLORS.green}` : ''}">${pct}% of goal</span>
    </div>
  `;
}

function renderStats() {
  document.getElementById('statGrid').innerHTML =
    statCard({ icon: '&#128099;', label: 'Steps', value: today.steps, unit: 'steps', goal: today.stepGoal, color: COLORS.red, dimColor: COLORS.redDim }) +
    statCard({ icon: '&#128293;', label: 'Calories', value: today.calories, unit: 'kcal', goal: today.calorieGoal, color: COLORS.amber, dimColor: COLORS.amberDim }) +
    statCard({ icon: '&#9201;', label: 'Active minutes', value: today.active, unit: 'min', goal: today.activeGoal, color: COLORS.green, dimColor: COLORS.greenDim }) +
    statCard({ icon: '&#128167;', label: 'Water', value: today.water, unit: 'cups', goal: today.waterGoal, color: COLORS.blue, dimColor: COLORS.blueDim });
}

let stepsChartInstance = null;
function renderStepsChart() {
  const total = weekly.reduce((s, d) => s + d.steps, 0);
  document.getElementById('weeklyStepsTotal').textContent = total.toLocaleString() + ' total';
  const ctx = document.getElementById('stepsChart');
  if (stepsChartInstance) stepsChartInstance.destroy();
  stepsChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: weekly.map(d => d.day),
      datasets: [{ data: weekly.map(d => d.steps), backgroundColor: COLORS.red, borderRadius: 2, maxBarThickness: 28 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: COLORS.surfaceAlt, borderColor: COLORS.border, borderWidth: 1,
        titleColor: COLORS.muted, bodyColor: COLORS.red, titleFont: { family: 'JetBrains Mono' }, bodyFont: { family: 'JetBrains Mono' }
      } },
      scales: {
        x: { ticks: { color: COLORS.muted, font: { family: 'JetBrains Mono', size: 11 } }, grid: { display: false } },
        y: { ticks: { color: COLORS.muted, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: COLORS.border } }
      }
    }
  });
}

let weightChartInstance = null;
function renderWeightChart() {
  const trend = weightLog.length > 1 ? +(weightLog[weightLog.length - 1].weight - weightLog[0].weight).toFixed(1) : 0;
  const trendEl = document.getElementById('weightTrend');
  trendEl.style.color = trend <= 0 ? COLORS.green : COLORS.red;
  trendEl.textContent = (trend <= 0 ? '▼ ' : '▲ ') + Math.abs(trend) + ' lb';
  const ctx = document.getElementById('weightChart');
  if (weightChartInstance) weightChartInstance.destroy();
  weightChartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels: weightLog.map(d => d.date),
      datasets: [{
        data: weightLog.map(d => d.weight),
        borderColor: COLORS.green, backgroundColor: COLORS.green,
        pointRadius: 3, pointBackgroundColor: COLORS.green, tension: 0.3, borderWidth: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: {
        backgroundColor: COLORS.surfaceAlt, borderColor: COLORS.border, borderWidth: 1,
        titleColor: COLORS.muted, bodyColor: COLORS.green, titleFont: { family: 'JetBrains Mono' }, bodyFont: { family: 'JetBrains Mono' },
        callbacks: { label: (c) => c.parsed.y + ' lb' }
      } },
      scales: {
        x: { ticks: { color: COLORS.muted, font: { family: 'JetBrains Mono', size: 10 } }, grid: { display: false } },
        y: { ticks: { color: COLORS.muted, font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: COLORS.border } }
      }
    }
  });
}

function renderWorkouts() {
  const list = document.getElementById('workoutList');
  if (workouts.length === 0) {
    list.innerHTML = '<div class="empty-state">No workouts logged yet. Add your first one below.</div>';
    return;
  }
  list.innerHTML = workouts.map(w => `
    <div class="workout-row">
      <span style="color:${COLORS.red}; font-size:16px;">&#127947;</span>
      <div style="flex:1; min-width:0;">
        <div class="workout-name">${w.name}</div>
        <div class="workout-meta">${w.type} · ${w.date}</div>
      </div>
      <div class="workout-num">${w.duration} min</div>
      <div class="workout-cal">${w.calories} kcal</div>
      <button class="icon-btn" onclick="removeWorkout(${w.id})" aria-label="Delete workout">&#128465;</button>
    </div>
  `).join('');
}

function renderFooter() {
  document.getElementById('footerWorkouts').textContent = workouts.length + ' sessions logged';
  document.getElementById('footerSessions').textContent = weekly.filter(d => d.steps > 0).length + ' active days this week';
}

function removeWorkout(id) {
  workouts = workouts.filter(w => w.id !== id);
  renderWorkouts();
  renderFooter();
}

function showWeightForm() {
  document.getElementById('weightFormRow').innerHTML = `
    <input type="number" placeholder="lbs" id="newWeightInput" style="width:80px;">
    <button class="lane-btn" onclick="addWeight()">Log</button>
    <button class="ghost-btn" onclick="cancelWeightForm()">Cancel</button>
  `;
}
function cancelWeightForm() {
  document.getElementById('weightFormRow').innerHTML = '<button class="ghost-btn" id="showWeightFormBtn" onclick="showWeightForm()">+ Log weight</button>';
}
function addWeight() {
  const val = parseFloat(document.getElementById('newWeightInput').value);
  if (!val || val <= 0) return;
  const now = new Date();
  const label = now.toLocaleString('en-US', { month: 'short' }) + ' ' + now.getDate();
  weightLog.push({ date: label, weight: val });
  renderWeightChart();
  cancelWeightForm();
}

function showWorkoutForm() {
  document.getElementById('workoutFormRow').innerHTML = `
    <input placeholder="Workout name" id="newWorkoutName" style="flex:1 1 160px;">
    <select id="newWorkoutType">${TYPE_OPTIONS.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
    <input type="number" placeholder="Duration (min)" id="newWorkoutDuration" style="width:130px;">
    <input type="number" placeholder="Calories" id="newWorkoutCalories" style="width:100px;">
    <button class="lane-btn" onclick="addWorkout()">Add</button>
    <button class="ghost-btn" onclick="cancelWorkoutForm()">Cancel</button>
  `;
}
function cancelWorkoutForm() {
  document.getElementById('workoutFormRow').innerHTML = '<button class="ghost-btn" id="showWorkoutFormBtn" onclick="showWorkoutForm()">+ Log workout</button>';
}
function addWorkout() {
  const name = document.getElementById('newWorkoutName').value.trim();
  const type = document.getElementById('newWorkoutType').value;
  const duration = Number(document.getElementById('newWorkoutDuration').value);
  const calories = Number(document.getElementById('newWorkoutCalories').value) || 0;
  if (!name || !duration) return;
  workouts.unshift({ id: Date.now(), name, type, duration, calories, date: 'Today' });
  renderWorkouts();
  renderFooter();
  cancelWorkoutForm();
}

document.getElementById('showWeightFormBtn').addEventListener('click', showWeightForm);
document.getElementById('showWorkoutFormBtn').addEventListener('click', showWorkoutForm);

renderStats();
renderStepsChart();
renderWeightChart();
renderWorkouts();
renderFooter();
</script>
</body>
</html>
